name: 🚀 Deploy Backend → Render.com

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test-and-deploy:
    name: Test, Build Docker & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        working-directory: backend
        run: npm ci

      # 4. Correr unit tests
      - name: 🧪 Correr unit tests
        working-directory: backend
        run: npm test

      # 5. Build Docker image (verifica que el Dockerfile compila bien)
      - name: 🐳 Build Docker image
        working-directory: backend
        run: docker build -t maneja-tus-gastos-backend:latest .

      # 6. Trigger deploy en Render.com via deploy hook
      - name: 🚀 Deploy a Render.com
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json" | jq .
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

